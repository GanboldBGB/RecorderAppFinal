<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Хурууны байрлал</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg:   #0c0e14;
    --s1:   #13151d;
    --s2:   #191c28;
    --s3:   #1f2235;
    --bd:   #252840;
    --ac:   #5b9cf6;
    --ac2:  #7eb8ff;
    --tx:   #eef0f8;
    --tx2:  #9298b8;
    --open: #1e293b;
    --closed: #5b9cf6;
    --thumb: #f59e0b;
    --half: #a78bfa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--tx);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .header {
    padding: 24px 32px 0;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .header-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, #1e3a5f, #0f1e35);
    border: 1px solid var(--bd);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header p  { font-size: 13px; color: var(--tx2); margin-top: 2px; }

  .note-selector {
    display: flex;
    gap: 8px;
    padding: 20px 32px 0;
    flex-wrap: wrap;
  }

  .note-btn {
    position: relative;
    width: 68px; height: 78px;
    border-radius: 14px;
    border: 2px solid var(--bd);
    background: var(--s1);
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 1px;
    overflow: hidden;
  }
  .note-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(91,156,246,0.15), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .note-btn:hover { transform: translateY(-3px); border-color: var(--ac); }
  .note-btn:hover::before { opacity: 1; }
  .note-btn.active {
    background: var(--s3);
    border-color: var(--ac);
    box-shadow: 0 0 20px rgba(91,156,246,0.3), 0 4px 16px rgba(0,0,0,0.4);
    transform: translateY(-4px);
  }
  .note-btn.active::before { opacity: 1; }
  .note-btn.playing {
    animation: btnPulse .6s ease;
  }
  @keyframes btnPulse {
    0% { box-shadow: 0 0 0 0 rgba(91,156,246,0.6); }
    100% { box-shadow: 0 0 0 14px transparent; }
  }

  .note-label {
    font-size: 22px; font-weight: 700;
    color: var(--tx);
    font-family: 'JetBrains Mono', monospace;
    line-height: 1;
  }
  .note-btn.active .note-label { color: var(--ac2); }
  .note-sub {
    font-size: 10px; color: var(--tx2);
    letter-spacing: 0.5px;
  }
  .note-num {
    font-size: 11px;
    font-weight: 700;
    color: var(--ac);
    font-family: 'JetBrains Mono', monospace;
    background: rgba(91,156,246,0.1);
    border-radius: 4px;
    padding: 1px 6px;
    line-height: 1.3;
    margin-top: 1px;
  }

  .main {
    display: flex;
    gap: 28px;
    padding: 24px 32px 32px;
    align-items: flex-start;
  }

  .recorder-container {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .recorder-wrap {
    position: relative;
    width: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    border-radius: 14px;
    padding: 6px;
    transition: all .25s;
  }
  .recorder-wrap:hover {
    background: rgba(91,156,246,0.05);
    transform: translateY(-3px);
  }
  .recorder-wrap:active { transform: scale(.98); }
  .recorder-wrap.playing {
    animation: recorderPulse .7s ease;
  }
  @keyframes recorderPulse {
    0%,100% { filter: brightness(1); }
    50%     { filter: brightness(1.3) drop-shadow(0 0 20px var(--ac)); }
  }

  .recorder-hint {
    font-size: 10px;
    color: var(--tx2);
    text-align: center;
    background: var(--s2);
    border: 1px solid var(--bd);
    padding: 4px 10px;
    border-radius: 6px;
    opacity: 0.7;
    transition: .2s;
  }
  .recorder-wrap:hover ~ .recorder-hint { opacity: 1; color: var(--ac2); }

  .recorder-svg { width: 120px; }

  .hole {
    transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  .hole.open {
    fill: #0a0c14;
    stroke: #3a4060;
    stroke-width: 1.5;
    filter: none;
  }
  .hole.closed {
    fill: var(--closed);
    stroke: var(--ac2);
    stroke-width: 2;
    filter: drop-shadow(0 0 6px rgba(91,156,246,0.7));
    animation: pulseHole 1.5s ease-in-out infinite;
  }
  .hole.half {
    fill: var(--half);
    stroke: #c4b5fd;
    stroke-width: 2;
    filter: drop-shadow(0 0 6px rgba(167,139,250,0.7));
    animation: pulseHalf 1.5s ease-in-out infinite;
  }
  .hole.thumb-closed {
    fill: var(--thumb);
    stroke: #fcd34d;
    stroke-width: 2;
    filter: drop-shadow(0 0 8px rgba(245,158,11,0.8));
    animation: pulseThumb 1.5s ease-in-out infinite;
  }
  .hole.thumb-open {
    fill: #0a0c14;
    stroke: #3a4060;
    stroke-width: 1.5;
    filter: none;
  }
  .hole.thumb-half {
    fill: #f97316;
    stroke: #fb923c;
    stroke-width: 2;
    filter: drop-shadow(0 0 8px rgba(249,115,22,0.8));
    animation: pulseThumb 1.5s ease-in-out infinite;
  }

  @keyframes pulseHole {
    0%,100% { filter: drop-shadow(0 0 6px rgba(91,156,246,0.7)); }
    50%     { filter: drop-shadow(0 0 12px rgba(91,156,246,1)); }
  }
  @keyframes pulseHalf {
    0%,100% { filter: drop-shadow(0 0 6px rgba(167,139,250,0.7)); }
    50%     { filter: drop-shadow(0 0 12px rgba(167,139,250,1)); }
  }
  @keyframes pulseThumb {
    0%,100% { filter: drop-shadow(0 0 8px rgba(245,158,11,0.8)); }
    50%     { filter: drop-shadow(0 0 14px rgba(245,158,11,1)); }
  }

  .info-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-width: 0;
  }

  .note-hero {
    background: linear-gradient(135deg, #1a1d2e, #0f111a);
    border: 1px solid var(--bd);
    border-radius: 16px;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }
  .note-hero::before {
    content: attr(data-note);
    position: absolute;
    right: 20px; top: 50%; transform: translateY(-50%);
    font-size: 120px; font-weight: 900;
    color: rgba(91,156,246,0.07);
    font-family: 'JetBrains Mono', monospace;
    line-height: 1;
    pointer-events: none;
  }

  .note-hero-top {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .note-hero-name {
    font-size: 48px; font-weight: 700;
    color: var(--ac2);
    font-family: 'JetBrains Mono', monospace;
    line-height: 1;
    cursor: pointer;
    transition: .2s;
    user-select: none;
  }
  .note-hero-name:hover { transform: scale(1.08); filter: brightness(1.2); }
  .note-hero-name:active { transform: scale(.95); }
  .note-hero-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 40px; height: 40px;
    border-radius: 12px;
    background: rgba(91,156,246,0.12);
    border: 2px solid rgba(91,156,246,0.3);
    font-size: 22px;
    font-weight: 800;
    color: var(--ac2);
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: .2s;
    user-select: none;
  }
  .note-hero-num:hover { transform: scale(1.1); background: rgba(91,156,246,0.2); }
  .note-hero-num:active { transform: scale(.95); }
  .play-btn-inline {
    background: var(--ac);
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: .2s;
    margin-left: auto;
    font-family: inherit;
  }
  .play-btn-inline:hover { transform: translateY(-2px); filter: brightness(1.15); }
  .play-btn-inline:active { transform: scale(.97); }
  .note-hero-mn   { font-size: 18px; color: var(--tx); margin-top: 4px; font-weight: 600; }
  .note-hero-desc { font-size: 13px; color: var(--tx2); margin-top: 8px; line-height: 1.6; }

  .finger-grid {
    background: var(--s1);
    border: 1px solid var(--bd);
    border-radius: 16px;
    padding: 20px;
  }
  .finger-grid-title {
    font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--tx2); margin-bottom: 16px;
  }

  .finger-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .finger-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 13px;
    border: 1px solid transparent;
    transition: all 0.3s;
  }
  .finger-chip.pressed {
    background: rgba(91,156,246,0.12);
    border-color: rgba(91,156,246,0.3);
    color: var(--ac2);
  }
  .finger-chip.open-chip {
    background: rgba(255,255,255,0.03);
    border-color: rgba(255,255,255,0.06);
    color: var(--tx2);
  }
  .finger-chip.half-chip {
    background: rgba(167,139,250,0.12);
    border-color: rgba(167,139,250,0.3);
    color: #c4b5fd;
  }
  .chip-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .chip-dot.pressed { background: var(--ac); }
  .chip-dot.open    { background: var(--bd); border: 1px solid #3a4060; }
  .chip-dot.half    { background: var(--half); }
  .chip-dot.thumb   { background: var(--thumb); }

  .legend {
    background: var(--s1);
    border: 1px solid var(--bd);
    border-radius: 16px;
    padding: 18px 20px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--tx2);
  }
  .legend-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 1.5px solid;
  }
  .legend-dot.l-closed { background: var(--ac); border-color: var(--ac2); }
  .legend-dot.l-open   { background: #0a0c14; border-color: #3a4060; }
  .legend-dot.l-half   { background: var(--half); border-color: #c4b5fd; }
  .legend-dot.l-thumb  { background: var(--thumb); border-color: #fcd34d; }

  /* Number reference — товчнууд (дуу гарна) */
  .num-ref {
    background: var(--s1);
    border: 1px solid var(--bd);
    border-radius: 16px;
    padding: 18px 20px;
  }
  .num-ref-title {
    font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--tx2); margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .num-ref-hint {
    font-size: 10px;
    color: var(--ac2);
    text-transform: none;
    letter-spacing: 0;
    font-weight: 500;
  }
  .num-ref-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .num-ref-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 10px;
    background: var(--s2);
    border: 1.5px solid var(--bd);
    font-size: 13px;
    color: var(--tx);
    transition: all 0.15s;
    cursor: pointer;
    user-select: none;
    position: relative;
    font-weight: 600;
  }
  .num-ref-item:hover {
    transform: translateY(-2px);
    border-color: var(--ac);
    background: rgba(91,156,246,0.08);
  }
  .num-ref-item:active {
    transform: translateY(0) scale(.96);
  }
  .num-ref-item.playing {
    animation: refPulse .6s ease;
  }
  @keyframes refPulse {
    0% { box-shadow: 0 0 0 0 var(--ac); }
    100% { box-shadow: 0 0 0 14px transparent; }
  }
  .num-ref-item.active-ref {
    border-color: var(--ac);
    background: rgba(91,156,246,0.1);
    color: var(--ac2);
    border-width: 2px;
  }
  .num-ref-item .ref-num {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 800;
    font-size: 16px;
    color: var(--ac);
    min-width: 14px;
    text-align: center;
  }
  .num-ref-item .ref-eq { color: var(--bd); }
  .num-ref-item .ref-play-icon {
    font-size: 11px;
    opacity: 0.4;
    margin-left: 4px;
    transition: .15s;
  }
  .num-ref-item:hover .ref-play-icon {
    opacity: 1;
  }

  .tip-box {
    background: linear-gradient(135deg, rgba(91,156,246,0.08), rgba(91,156,246,0.03));
    border: 1px solid rgba(91,156,246,0.2);
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 13px;
    color: var(--tx2);
    line-height: 1.6;
  }
  .tip-box strong { color: var(--ac2); }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .animate-in { animation: fadeInUp 0.35s ease forwards; }

  @media (max-width: 700px) {
    .main { flex-direction: column; padding: 16px; }
    .recorder-container { flex-direction: row; gap: 20px; width: 100%; }
    .note-selector { padding: 16px 16px 0; }
    .header { padding: 16px 16px 0; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🤚</div>
  <div>
    <h1>Хурууны байрлал</h1>
    <p>Нот бүрийн хурууны байрлалыг сурах — товч бүр дээр дарж дуу сонсох 🔊</p>
  </div>
</div>

<!-- Note selector -->
<div class="note-selector" id="noteSelector"></div>

<!-- Main content -->
<div class="main">

  <!-- Recorder visual -->
  <div class="recorder-container">
    <div class="recorder-wrap" id="recorderWrap" title="Бишгүүр дээр дарж дуу сонсох">
      <svg class="recorder-svg" id="recorderSvg" viewBox="0 0 120 560" xmlns="http://www.w3.org/2000/svg" style="pointer-events:none;">

        <ellipse id="hole-thumb" class="hole thumb-closed" cx="60" cy="100" rx="10" ry="7"/>
        <circle id="hole-1" class="hole closed" cx="60" cy="158" r="9"/>
        <circle id="hole-2" class="hole closed" cx="60" cy="206" r="9"/>
        <circle id="hole-3" class="hole closed" cx="60" cy="254" r="9"/>
        <circle id="hole-4" class="hole closed" cx="60" cy="310" r="9"/>

        <text x="94" y="162" fill="#3a4060" font-size="9" font-family="JetBrains Mono">1</text>
        <text x="94" y="210" fill="#3a4060" font-size="9" font-family="JetBrains Mono">2</text>
        <text x="94" y="258" fill="#3a4060" font-size="9" font-family="JetBrains Mono">3</text>
        <text x="94" y="314" fill="#3a4060" font-size="9" font-family="JetBrains Mono">4</text>
        <text x="94" y="360" fill="#3a4060" font-size="9" font-family="JetBrains Mono">5</text>
        <text x="94" y="406" fill="#3a4060" font-size="9" font-family="JetBrains Mono">6</text>
        <text x="94" y="444" fill="#3a4060" font-size="9" font-family="JetBrains Mono">7</text>
      </svg>
    </div>
    <div class="recorder-hint">🔊 Дарж дуу сонсох</div>
  </div>

  <!-- Info panel -->
  <div class="info-panel" id="infoPanel"></div>

</div>

<script>

  { name:'C',  num:7, mn:'До (C4)',   octave:4, freq:523.25,

    holes:['closed','closed','closed','closed','closed','open','open','open','open','open'],
    fingers:[
      {name:'Эрхий (Т)',hand:'Зүүн',state:'closed'},
      {name:'1-р хуруу',hand:'Зүүн',state:'closed'},

  { name:'F',  num:4, mn:'Фа (F4)',   octave:4, freq:698.46,

const HOLE_IDS = ['hole-thumb','hole-1','hole-2','hole-3','hole-4','hole-5','hole-6a','hole-6b','hole-7a','hole-7b'];

/* ══════════════════════════════════════
   ДУУ ТОГЛОХ — Web Audio API
══════════════════════════════════════ */
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playNote(freq) {
  const ac = getAudioCtx();
  const t = ac.currentTime;

  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, t);

  const osc2 = ac.createOscillator();
  const gain2 = ac.createGain();
  osc2.type = 'triangle';
  osc2.frequency.setValueAtTime(freq * 2, t);
  gain2.gain.setValueAtTime(0.1, t);

  osc.connect(gain);
  osc2.connect(gain2);
  gain.connect(ac.destination);
  gain2.connect(ac.destination);

  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(0.5, t + 0.05);
  gain.gain.exponentialRampToValueAtTime(0.3, t + 0.3);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 1.2);

  gain2.gain.setValueAtTime(0, t);
  gain2.gain.linearRampToValueAtTime(0.08, t + 0.05);
  gain2.gain.exponentialRampToValueAtTime(0.001, t + 1.2);

  osc.start(t);  osc.stop(t + 1.3);
  osc2.start(t); osc2.stop(t + 1.3);
}

function animatePlay(el) {
  if (!el) return;
  el.classList.remove('playing');
  void el.offsetWidth;
  el.classList.add('playing');
  setTimeout(() => el.classList.remove('playing'), 700);
}

/* Тоон тэмдэглэгээ товчинд дуу гаргана */
function playByNum(num, e) {
  if (e) e.stopPropagation();
  const note = NOTES.find(n => n.num === num && n.octave === 4);
  if (!note) return;
  playNote(note.freq);
  if (e && e.currentTarget) animatePlay(e.currentTarget);
}

/* Идэвхтэй нотын дууг тоглуулна */
function playCurrent() {
  const note = NOTES[currentNote];
  if (!note) return;
  playNote(note.freq);
  animatePlay(document.getElementById('recorderWrap'));
}

function holeClass(idx, state, isThumb) {
  if (isThumb) {
    if (state === 'closed') return 'hole thumb-closed';
    if (state === 'half')   return 'hole thumb-half';
    return 'hole thumb-open';
  }
  if (state === 'closed') return 'hole closed';
  if (state === 'half')   return 'hole half';
  return 'hole open';
}

function chipHtml(f) {
  const state = f.state;
  let cls, dotCls, label;
  if (state === 'closed') { cls='finger-chip pressed'; dotCls='chip-dot pressed'; label='Дарна'; }
  else if (state === 'half') { cls='finger-chip half-chip'; dotCls='chip-dot half'; label='Хагас'; }
  else { cls='finger-chip open-chip'; dotCls='chip-dot open'; label='Нээлттэй'; }

  return `<div class="${cls}">
    <div class="${dotCls}"></div>
    <span>${f.name} (${f.hand})</span>
    <span style="opacity:0.6; font-size:11px;">${label}</span>
  </div>`;
}

let currentNote = 0;

function renderNoteSelector() {
  const sel = document.getElementById('noteSelector');
  sel.innerHTML = NOTES.map((n, i) => `
    <button class="note-btn ${i === 0 ? 'active' : ''}" onclick="selectNote(${i})">
      <span class="note-label">${n.name}</span>
      <span class="note-sub">${n.mn.split(' ')[0]}</span>
      <span class="note-num">№${n.num}</span>
    </button>
  `).join('');
}

function animateHoles(note) {
  HOLE_IDS.forEach((id, idx) => {
    const el = document.getElementById(id);
    if (!el) return;
    const state = note.holes[idx];
    const isThumb = (idx === 0);
    setTimeout(() => {
      el.className = holeClass(idx, state, isThumb);
    }, idx * 40);
  });
}

/* Тоон тэмдэглэгээ — товчнууд (дуу гаргана) */
function buildNumRef(activeNote) {
  // num бүрд хамгийн ойрын C4 octave-ийн freq олно
  const baseNotes = NOTES.filter(n => n.octave === 4);
  return baseNotes.map(r => {
    const isActive = activeNote.name.replace("'","") === r.name;
    return `<div class="num-ref-item ${isActive ? 'active-ref' : ''}"
                 onclick="playByNum(${r.num}, event)"
                 title="Дарж ${r.name} (${r.mn.split(' ')[0]}) дуу сонсох">
      <span class="ref-num">${r.num}</span>
      <span class="ref-eq">=</span>
      <span>${r.name} (${r.mn.split(' ')[0]})</span>
      <span class="ref-play-icon">🔊</span>
    </div>`;
  }).join('');
}

function selectNote(i) {
  currentNote = i;
  const note = NOTES[i];

  // Нот сонгоход дуу автоматаар тоглуулна
  playNote(note.freq);

  document.querySelectorAll('.note-btn').forEach((b, j) => {
    b.classList.toggle('active', j === i);
    if (j === i) animatePlay(b);
  });

  animateHoles(note);
  animatePlay(document.getElementById('recorderWrap'));

  const panel = document.getElementById('infoPanel');
  panel.innerHTML = `
    <div class="note-hero animate-in" data-note="${note.name}">
      <div class="note-hero-top">
        <div class="note-hero-name" onclick="playCurrent()" title="Дарж дуу сонсох">${note.name}</div>
        <div class="note-hero-num" onclick="playCurrent()" title="Дарж дуу сонсох">${note.num}</div>
        <button class="play-btn-inline" onclick="playCurrent()">▶ Дуу сонсох</button>
      </div>
      <div class="note-hero-mn">${note.mn} — Тоон тэмдэглэгээ: №${note.num}</div>
      <div class="note-hero-desc">${note.desc}</div>
    </div>

    <div class="num-ref animate-in" style="animation-delay:0.03s;">
      <div class="num-ref-title">
        <span>🔢 ТООН ТЭМДЭГЛЭГЭЭ</span>
        <span class="num-ref-hint">💡 Товч дээр дарж дуу сонсох</span>
      </div>
      <div class="num-ref-row">
        ${buildNumRef(note)}
      </div>
    </div>

    <div class="finger-grid animate-in" style="animation-delay:0.06s;">
      <div class="finger-grid-title">🤚 ХУРУУНЫ БАЙРЛАЛ — ${note.name} (№${note.num})</div>
      <div class="finger-row">
        ${note.fingers.map(f => chipHtml(f)).join('')}
      </div>
    </div>

    <div class="tip-box animate-in" style="animation-delay:0.09s;">
      💡 <strong>Зөвлөмж:</strong> ${note.tip}
    </div>

    <div class="legend animate-in" style="animation-delay:0.12s;">
      <div style="font-size:11px; letter-spacing:2px; text-transform:uppercase;
                  color:var(--tx2); width:100%; margin-bottom:4px;">ТАЙЛАЛ</div>
      <div class="legend-item">
        <div class="legend-dot l-thumb"></div> Эрхий хаалттай
      </div>
      <div class="legend-item">
        <div class="legend-dot l-closed"></div> Хуруу дарна
      </div>
      <div class="legend-item">
        <div class="legend-dot l-open"></div> Нээлттэй
      </div>
      <div class="legend-item">
        <div class="legend-dot l-half"></div> Хагас (pinch)
      </div>
    </div>
  `;
}

/* Бишгүүр зураг дээр дарахад дуу */
document.getElementById('recorderWrap').addEventListener('click', playCurrent);
