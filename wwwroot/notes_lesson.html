<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Нот Сурах — Бишгүүр</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+Mongolian&display=swap');

:root {
  --bg: #0c0e14;
  --s1: #13151d;
  --s2: #191c28;
  --s3: #1f2235;
  --bd: #252840;
  --ac: #5b9cf6;
  --tx: #eef0f8;
  --tx2: #9298b8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--tx);
  font-family: 'Segoe UI', sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 28px;
  border-bottom: 1px solid var(--bd);
  background: var(--s1);
  flex-shrink: 0;
}
.topbar-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--tx);
  display: flex;
  align-items: center;
  gap: 10px;
}
.topbar-title span { color: var(--ac); }

.mode-tabs {
  display: flex;
  gap: 6px;
  background: var(--s2);
  border: 1px solid var(--bd);
  border-radius: 10px;
  padding: 4px;
}
.mode-tab {
  padding: 7px 18px;
  border-radius: 7px;
  border: none;
  background: transparent;
  color: var(--tx2);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: .2s;
}
.mode-tab.active {
  background: var(--ac);
  color: #fff;
}

.main { display: flex; flex: 1; overflow: hidden; }

.notes-sidebar {
  width: 220px;
  border-right: 1px solid var(--bd);
  background: var(--s1);
  display: flex;
  flex-direction: column;
  padding: 16px 10px;
  gap: 6px;
  overflow-y: auto;
  flex-shrink: 0;
}
.notes-sidebar-label {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--tx2);
  text-transform: uppercase;
  padding: 0 8px;
  margin-bottom: 4px;
}
.note-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
  transition: .18s;
  border: 1px solid transparent;
  position: relative;
}
.note-item:hover { background: var(--s2); }
.note-item.active { background: var(--s3); border-color: var(--bd); }
.note-item.playing { animation: pulseRef .6s ease; }
.note-dot {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 16px; color: #fff;
  flex-shrink: 0;
  position: relative;
}
.note-dot .num-badge {
  position: absolute;
  top: -5px; right: -7px;
  width: 17px; height: 17px;
  border-radius: 50%;
  background: var(--s1);
  border: 1.5px solid var(--bd);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 800; color: var(--tx);
}
.note-item-info { flex: 1; }
.note-item-name { font-size: 14px; font-weight: 700; color: var(--tx); }
.note-item-mn   { font-size: 12px; color: var(--tx2); }
.note-item-check {
  font-size: 14px;
  color: #27ae60;
  opacity: 0;
  transition: .2s;
}
.note-item.learned .note-item-check { opacity: 1; }

.content-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px 28px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.note-hero {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 18px;
  padding: 28px 32px;
  display: flex;
  gap: 28px;
  align-items: stretch;
  position: relative;
  overflow: hidden;
  transition: border-color .3s;
}
.note-big {
  width: 110px;
  height: 110px;
  border-radius: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 64px;
  font-weight: 900;
  color: #fff;
  flex-shrink: 0;
  position: relative;
  box-shadow: 0 12px 40px rgba(0,0,0,.5);
  transition: transform .2s;
  cursor: pointer;
  user-select: none;
}
.note-big:hover { transform: scale(1.05) rotate(-2deg); }
.note-big:active { transform: scale(.95); }
.note-big.playing { animation: bigPulse .6s ease; }
@keyframes bigPulse {
  0%,100% { box-shadow: 0 12px 40px rgba(0,0,0,.5); }
  50% { box-shadow: 0 12px 60px currentColor; }
}
.note-big .note-shine {
  position: absolute;
  top: 8px; left: 12px;
  width: 28px; height: 10px;
  background: rgba(255,255,255,.25);
  border-radius: 10px;
  transform: rotate(-20deg);
}
.note-big .num-corner {
  position: absolute;
  top: -8px; right: -8px;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--s1);
  border: 2px solid var(--bd);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 900; color: var(--tx);
  box-shadow: 0 4px 12px rgba(0,0,0,.4);
}

.note-info { flex: 1; }
.note-info-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.note-info-name { font-size: 36px; font-weight: 900; line-height: 1; cursor: pointer; transition: .2s; }
.note-info-name:hover { transform: scale(1.08); }
.note-info-mn { font-size: 20px; color: var(--tx2); }
.note-info-num {
  font-size: 14px;
  font-weight: 800;
  padding: 4px 12px;
  border-radius: 8px;
  background: var(--s2);
  border: 1px solid var(--bd);
  color: var(--tx);
  cursor: pointer;
  transition: .2s;
}
.note-info-num:hover { transform: translateY(-2px); }
.note-info-desc {
  font-size: 14px;
  color: var(--tx2);
  line-height: 1.8;
  margin-bottom: 14px;
  max-width: 480px;
}

.play-note-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 22px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: .2s;
  color: #fff;
}
.play-note-btn:hover { transform: translateY(-2px); filter: brightness(1.15); }
.play-note-btn:active { transform: scale(.97); }

.staff-card {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 18px;
  padding: 24px 32px;
}
.staff-label {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--tx2);
  text-transform: uppercase;
  margin-bottom: 16px;
}
.staff-svg-wrap {
  background: #1a1c28;
  border-radius: 12px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  overflow-x: auto;
}

.fingering-card {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 18px;
  padding: 24px 32px;
  display: flex;
  gap: 32px;
  align-items: flex-start;
}
.fingering-left {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}
.fingering-title {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--tx2);
  text-transform: uppercase;
}
.fingering-right { flex: 1; }
.fingering-right h3 {
  font-size: 15px;
  font-weight: 700;
  color: var(--tx);
  margin-bottom: 14px;
}

/* Бишгүүр SVG товч шиг харагдах */
.recorder-svg-wrap {
  cursor: pointer;
  border-radius: 14px;
  padding: 8px;
  transition: all .2s;
  position: relative;
}
.recorder-svg-wrap:hover {
  background: var(--s2);
  transform: translateY(-3px);
}
.recorder-svg-wrap:active { transform: scale(.97); }
.recorder-svg-wrap.playing { animation: bigPulse .6s ease; }
.recorder-svg-wrap::after {
  content: '🔊 Дарж сонсох';
  position: absolute;
  bottom: -4px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  color: var(--tx2);
  background: var(--s1);
  padding: 2px 8px;
  border-radius: 6px;
  border: 1px solid var(--bd);
  opacity: 0;
  transition: .2s;
  white-space: nowrap;
}
.recorder-svg-wrap:hover::after { opacity: 1; bottom: -10px; }

.holes-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
.hole-row { display: flex; align-items: center; gap: 10px; }
.hole-label { font-size: 12px; color: var(--tx2); width: 80px; flex-shrink: 0; }
.hole-indicator {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  border: 2px solid;
  transition: .3s;
}
.hole-closed { background: #1a0a02; border-color: #6b4c1e; color: #fff; }
.hole-open { background: #f0d080; border-color: #b8860b; color: #333; }

.tip-box {
  background: var(--s2);
  border: 1px solid var(--bd);
  border-left: 3px solid var(--ac);
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 13px;
  color: var(--tx2);
  line-height: 1.7;
}
.tip-box strong { color: var(--tx); }

.num-ref-card {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 18px;
  padding: 18px 28px;
}
.num-ref-label {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--tx2);
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.num-ref-hint {
  font-size: 11px;
  color: var(--tx2);
  text-transform: none;
  letter-spacing: 0;
  font-weight: 400;
}
.num-ref-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.num-ref-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border-radius: 10px;
  background: var(--s2);
  border: 1.5px solid var(--bd);
  font-size: 13px;
  color: var(--tx);
  transition: all 0.15s;
  cursor: pointer;
  user-select: none;
  position: relative;
  font-weight: 600;
}
.num-ref-item:hover {
  transform: translateY(-2px);
  filter: brightness(1.15);
}
.num-ref-item:active {
  transform: translateY(0) scale(.96);
}
.num-ref-item.playing {
  animation: pulseRef .6s ease;
}
@keyframes pulseRef {
  0% { box-shadow: 0 0 0 0 currentColor; }
  100% { box-shadow: 0 0 0 14px transparent; }
}
.num-ref-item.active-ref { border-width: 2px; }
.num-ref-item .ref-num {
  font-family: 'Space Mono', monospace;
  font-weight: 800;
  font-size: 18px;
  min-width: 16px;
  text-align: center;
}
.num-ref-item .ref-eq { color: var(--bd); }
.num-ref-item .ref-play-icon {
  font-size: 11px;
  opacity: 0.5;
  margin-left: 4px;
}
.num-ref-item:hover .ref-play-icon { opacity: 1; }

/* Quiz styles */
.quiz-panel {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 18px;
  padding: 32px;
  text-align: center;
}
.quiz-question {
  font-size: 15px;
  color: var(--tx2);
  margin-bottom: 24px;
  letter-spacing: 1px;
}
.quiz-note-display {
  width: 120px; height: 120px;
  border-radius: 28px;
  margin: 0 auto 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 72px;
  font-weight: 900;
  color: #fff;
  box-shadow: 0 16px 50px rgba(0,0,0,.5);
  animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
  position: relative;
  cursor: pointer;
  transition: .2s;
}
.quiz-note-display:hover { transform: scale(1.05); }
.quiz-note-display .num-corner {
  position: absolute;
  top: -8px; right: -8px;
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--s1);
  border: 2px solid var(--bd);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 900; color: var(--tx);
  box-shadow: 0 4px 12px rgba(0,0,0,.4);
}
@keyframes popIn {
  from { transform: scale(.5); opacity: 0; }
  to   { transform: scale(1);  opacity: 1; }
}
.quiz-choices {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  max-width: 520px;
  margin: 0 auto 20px;
}
.quiz-choice {
  padding: 14px;
  border-radius: 12px;
  border: 2px solid var(--bd);
  background: var(--s2);
  color: var(--tx);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: .18s;
}
.quiz-choice:hover { border-color: var(--ac); transform: translateY(-2px); }
.quiz-choice.correct { border-color: #27ae60; background: #1a3a1a; color: #4caf74; }
.quiz-choice.wrong   { border-color: #e74c3c; background: #3a1a1a; color: #e74c3c; }

.quiz-result {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 10px;
  min-height: 32px;
  transition: .2s;
}
.quiz-sub { font-size: 13px; color: var(--tx2); margin-bottom: 20px; }
.quiz-next-btn {
  padding: 12px 32px;
  border-radius: 10px;
  border: none;
  background: var(--ac);
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: .2s;
  display: none;
}
.quiz-next-btn:hover { background: #4a8ce0; transform: translateY(-2px); }

.score-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: center;
  margin-bottom: 24px;
}
.score-pip {
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--bd);
  transition: .3s;
}
.score-pip.correct { background: #27ae60; }
.score-pip.wrong   { background: #e74c3c; }

.all-notes-row {
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 18px;
  padding: 22px 28px;
}
.all-notes-label {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--tx2);
  text-transform: uppercase;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.all-notes-grid {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 6px;
}
.mini-note-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 14px 12px;
  background: var(--s2);
  border: 2px solid transparent;
  border-radius: 14px;
  cursor: pointer;
  transition: .18s;
  min-width: 76px;
  flex-shrink: 0;
  position: relative;
}
.mini-note-card:hover { transform: translateY(-4px); border-color: var(--bd); }
.mini-note-card.active { border-color: var(--ac); background: var(--s3); }
.mini-note-card.playing { animation: pulseRef .6s ease; }
.mini-note-circle {
  width: 48px; height: 48px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 900; color: #fff;
  box-shadow: 0 4px 14px rgba(0,0,0,.4);
  position: relative;
}
.mini-note-circle .num-badge-sm {
  position: absolute;
  top: -4px; right: -6px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--s1);
  border: 1.5px solid var(--bd);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 900; color: var(--tx);
}
.mini-note-sym { font-size: 15px; font-weight: 700; color: var(--tx); }
.mini-note-mn  { font-size: 11px; color: var(--tx2); }
.mini-note-num {
  font-size: 10px;
  color: var(--ac);
  font-weight: 800;
  font-family: 'Space Mono', monospace;
}

/* Mini нотын карт дээр sound icon */
.mini-card-actions {
  position: absolute;
  top: 4px; right: 4px;
  display: flex;
  gap: 2px;
}
.mini-sound-btn {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: rgba(91,156,246,0.15);
  border: 1px solid rgba(91,156,246,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  cursor: pointer;
  transition: .15s;
  opacity: 0.6;
}
.mini-sound-btn:hover { opacity: 1; background: rgba(91,156,246,0.3); transform: scale(1.15); }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 3px; }

.progress-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 6px;
}
.prog-dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 900; color: #fff;
  opacity: 0.35;
  transition: .3s;
  cursor: pointer;
  font-family: 'Space Mono', monospace;
}
.prog-dot:hover { opacity: .7; transform: scale(1.1); }
.prog-dot.done { opacity: 1; box-shadow: 0 0 10px currentColor; }

.fade-in { animation: fadeIn .35s ease both; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Staff SVG note hover */
.staff-note-group { transition: .2s; }
.staff-note-group:hover { transform: translateY(-3px); transform-origin: center; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">
    🎵 Нот Сурах — <span>Бишгүүр</span>
  </div>
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('learn', this)">📖 Сурах</button>
    <button class="mode-tab" onclick="setMode('quiz',  this)">🎯 Дасгал</button>
  </div>
</div>

<div class="main">
  <div class="notes-sidebar" id="notes-sidebar"></div>
  <div class="content-area" id="content-area">
    <div style="color:var(--tx2); text-align:center; margin:auto; font-size:15px;">
      ← Нотоо сонгоно уу
    </div>
  </div>
</div>

<script>
const NOTES = [
  { sym:'C', mn:'До',  num:7, color:'#e74c3c', freq:523.25,
    desc:'До нот — бишгүүрийн хамгийн нам дуутай нот. Бүх нүхийг хаасан үед гардаг. Эхлэгч суралцагчдад хамгийн чухал нот.',
    tip:'Бүх 7 нүхийг нягт хаах хэрэгтэй. Хурууны дэрлэгээр нүхийг бүрэн бүглэ — агаар гарахгүй байх ёстой.',
    fingers:[
      {label:'Эрхий (ар)',closed:true},{label:'1-р хуруу',closed:true},
      {label:'2-р хуруу',closed:true},{label:'3-р хуруу',closed:true},
      {label:'4-р хуруу',closed:true},{label:'5-р хуруу',closed:true},
      {label:'6-р хуруу',closed:true}]},
  { sym:'D', mn:'Ре',  num:6, color:'#e67e22', freq:587.33,
    desc:'Ре нот — До-оос нэг хагас алхам дээш. Хамгийн сүүлийн нүхийг нээснээр үүсдэг.',
    tip:'Зөвхөн 6-р нүхийг нээнэ, бусдыг хаана. Дуу нь До-оос арай өндөр болно.',
    fingers:[
      {label:'Эрхий (ар)',closed:true},{label:'1-р хуруу',closed:true},
      {label:'2-р хуруу',closed:true},{label:'3-р хуруу',closed:true},
      {label:'4-р хуруу',closed:true},{label:'5-р хуруу',closed:true},
      {label:'6-р хуруу',closed:false}]},
  { sym:'E', mn:'Ми',  num:5, color:'#f1c40f', freq:659.25,
    desc:'Ми нот — дунд өндөрлөгийн нот. 5, 6-р нүхийг нээхэд гарна.',
    tip:'5-р болон 6-р нүхийг нэгэн зэрэг нээнэ. Хурууны хөдөлгөөн уян байх ёстой.',
    fingers:[
      {label:'Эрхий (ар)',closed:true},{label:'1-р хуруу',closed:true},
      {label:'2-р хуруу',closed:true},{label:'3-р хуруу',closed:true},
      {label:'4-р хуруу',closed:true},{label:'5-р хуруу',closed:false},
      {label:'6-р хуруу',closed:false}]},
  { sym:'F', mn:'Фа',  num:4, color:'#27ae60', freq:698.46,
    desc:'Фа нот — анхаарал шаарддаг нот. 4-р нүх нээгдэж, 5-р хаагдана.',

/* ══════════════════════════════════════
   ДУУ ТОГЛОХ — Web Audio API
══════════════════════════════════════ */
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playNote(freq) {
  const ac = getAudioCtx();
  const t  = ac.currentTime;

  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, t);

  const osc2 = ac.createOscillator();
  const gain2 = ac.createGain();
  osc2.type = 'triangle';
  osc2.frequency.setValueAtTime(freq * 2, t);
  gain2.gain.setValueAtTime(0.1, t);

  osc.connect(gain);
  osc2.connect(gain2);
  gain.connect(ac.destination);
  gain2.connect(ac.destination);

  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(0.5, t + 0.05);
  gain.gain.exponentialRampToValueAtTime(0.3, t + 0.3);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 1.2);

  gain2.gain.setValueAtTime(0, t);
  gain2.gain.linearRampToValueAtTime(0.08, t + 0.05);
  gain2.gain.exponentialRampToValueAtTime(0.001, t + 1.2);

  osc.start(t);  osc.stop(t + 1.3);
  osc2.start(t); osc2.stop(t + 1.3);
}

/* НЭГДСЭН ДУУ ТОГЛОГЧ — sym/num/freq аль нэгээр */
function playNoteBySym(sym, animateEl) {
  const note = NOTES.find(n => n.sym === sym);
  if (!note) return;
  playNote(note.freq);
  animatePlay(animateEl);
}

function playNoteByNum(num) {
  const note = NOTES.find(n => n.num === num);
  if (!note) return;
  playNote(note.freq);
  const item = document.querySelector(`[data-num="${num}"]`);
  animatePlay(item);
}

function animatePlay(el) {
  if (!el) return;
  el.classList.remove('playing');
  void el.offsetWidth;
  el.classList.add('playing');
  setTimeout(() => el.classList.remove('playing'), 600);
}

/* Дарахад event-ийг үндсэн товчид нь хүргэхгүй (e.stopPropagation) */
function stopAndPlay(e, sym) {
  if (e) e.stopPropagation();
  const note = NOTES.find(n => n.sym === sym);
  if (!note) return;
  playNote(note.freq);
  if (e && e.currentTarget) animatePlay(e.currentTarget.closest('.mini-note-card, .note-item, .note-big, .recorder-svg-wrap, .quiz-note-display, .num-ref-item, .staff-note-group') || e.currentTarget);
}

/* selectNote дотор дуу автоматаар гаргана */
function selectNote(sym) {
  currentNote = NOTES.find(n => n.sym === sym);
  if (!currentNote) return;

  // Нотыг сонгох үед дуу автоматаар тоглуулна
  playNote(currentNote.freq);

  document.querySelectorAll('.note-item').forEach(el => el.classList.remove('active'));
  const ni = document.getElementById(`ni-${sym}`);
  if (ni) {
    ni.classList.add('active');
    animatePlay(ni);
  }

  learnedNotes.add(sym);
  document.getElementById(`ni-${sym}`).classList.add('learned');
  updateProgress();

  if (currentMode === 'learn') renderLearn();
}

/* ══════════════════════════════════════
   STAFF SVG — нот тус бүр товч
══════════════════════════════════════ */
function buildStaffSVG(activeNote) {
  const positions = { C:88, D:80, E:72, F:64, G:56, A:48, B:40 };
  const w = Math.max(520, NOTES.length * 68 + 80);
  const h = 120;
  const staffTop = 30;
  const lineGap = 10;

  let svg = `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"
               style="font-family:serif; overflow:visible;">`;
  svg += `<text x="8" y="${staffTop + 38}" font-size="52" fill="#9298b8" font-family="serif">𝄞</text>`;

  for (let i = 0; i < 5; i++) {
    const y = staffTop + i * lineGap;
    svg += `<line x1="48" y1="${y}" x2="${w-10}" y2="${y}" stroke="#252840" stroke-width="1.5"/>`;
  }
  svg += `<line x1="88" y1="${staffTop+60}" x2="122" y2="${staffTop+60}" stroke="#252840" stroke-width="1.5" opacity="0.5"/>`;

  NOTES.forEach((n, i) => {
    const x = 72 + i * 65;
    const y = positions[n.sym];
    const isActive = n.sym === activeNote.sym;
    const alpha = isActive ? 1 : 0.4;

    // Нот тус бүр дээр дарахад дуу гарна
    svg += `<g class="staff-note-group" style="cursor:pointer" onclick="playNote(${n.freq})">`;
    // Том invisible click area
    svg += `<rect x="${x-18}" y="${y-26}" width="36" height="52" fill="transparent"/>`;
    svg += `<ellipse cx="${x}" cy="${y}" rx="10" ry="7" fill="${n.color}" opacity="${alpha}" transform="rotate(-15,${x},${y})"/>`;
    svg += `<line x1="${x+9}" y1="${y}" x2="${x+9}" y2="${y-30}" stroke="${n.color}" stroke-width="2" opacity="${alpha}"/>`;
    svg += `<text x="${x}" y="${y+22}" text-anchor="middle" font-size="11" fill="${n.color}" font-weight="700" opacity="${alpha}">${n.sym}</text>`;
    svg += `<text x="${x}" y="${y+34}" text-anchor="middle" font-size="10" fill="${n.color}" font-weight="600" opacity="${alpha * 0.7}">№${n.num}</text>`;

    if (isActive) {
      svg += `<ellipse cx="${x}" cy="${y}" rx="14" ry="11" fill="${n.color}" opacity="0.2" transform="rotate(-15,${x},${y})"/>`;
    }
    svg += `<title>${n.sym} (${n.mn}) №${n.num} — Дарж дуу сонсох</title>`;
    svg += `</g>`;
  });

  svg += `</svg>`;
  return svg;
}

function buildRecorderSVG(note) {
  const f = note.fingers;
  const closed = '#1a0a02';
  const open   = '#f0d080';
  const color  = note.color;

  return `
  <svg width="72" height="240" viewBox="0 0 72 240"
       style="filter:drop-shadow(0 0 14px ${color}66); transition:filter .3s; pointer-events:none;">
    <rect x="26" y="10" width="20" height="218" fill="#b8904a" rx="7"/>
    <rect x="29" y="0" width="14" height="18" fill="#8a6030" rx="4"/>
    <circle cx="16" cy="45" r="8"
            fill="${f[0].closed?closed:open}"
            stroke="${f[0].closed?'#8a6030':color}" stroke-width="2"/>
    <line x1="24" y1="45" x2="26" y2="45" stroke="#8a6030" stroke-width="1.5"/>
    ${[70,96,122,146,164,182].map((cy,i)=>`
      <circle cx="36" cy="${cy}" r="${i<3?8:7}"
              fill="${f[i+1].closed?closed:open}"
              stroke="${f[i+1].closed?'#8a6030':color}" stroke-width="2"/>
    `).join('')}
    <ellipse cx="36" cy="226" rx="14" ry="6" fill="#9a7030"/>
  </svg>`;
}

function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  if (mode === 'learn') {
    if (currentNote) renderLearn();
    else {
      document.getElementById('content-area').innerHTML =
        `<div style="color:var(--tx2);text-align:center;margin:auto;font-size:15px;">← Нотоо сонгоно уу</div>`;
    }
  } else {
    renderQuiz();
  }
}

function renderQuiz() {
  quizQueue = [];
  for (let i = 0; i < 10; i++) {
    quizQueue.push(NOTES[Math.floor(Math.random() * NOTES.length)]);
  }
  quizIdx = 0; quizScore = 0; quizAnswered = false; quizHistory = [];
  showQuizQuestion();
}

function showQuizQuestion() {
  const ca = document.getElementById('content-area');

  if (quizIdx >= quizQueue.length) {
    ca.innerHTML = `
      <div class="quiz-panel fade-in" style="max-width:520px; margin:auto;">
        <div style="font-size:48px; margin-bottom:16px;">
          ${quizScore >= 8 ? '🏆' : quizScore >= 5 ? '🎵' : '📖'}
        </div>
        <div style="font-size:28px; font-weight:900; color:var(--tx); margin-bottom:8px;">
          ${quizScore} / ${quizQueue.length}
        </div>
        <div style="font-size:16px; color:var(--tx2); margin-bottom:24px;">
          ${quizScore >= 8 ? 'Гайхалтай! Та нотуудыг маш сайн мэдэж байна!' :
            quizScore >= 5 ? 'Сайн байна! Бага зэрэг дасгалла.' :
            'Дахин дасгалла. Та чадна!'}
        </div>
        <div class="score-bar" style="justify-content:center; gap:6px; margin-bottom:24px;">
          ${quizHistory.map(h => `<div class="score-pip ${h?'correct':'wrong'}"></div>`).join('')}
        </div>
        <button class="quiz-next-btn" style="display:inline-block"
                onclick="renderQuiz()">🔄 Дахин тоглох</button>
      </div>`;
    return;
  }

  const q = quizQueue[quizIdx];
  const choices = [q];
  const others = NOTES.filter(n => n.sym !== q.sym);
  while (choices.length < 4) {
    const r = others[Math.floor(Math.random() * others.length)];
    if (!choices.find(c => c.sym === r.sym)) choices.push(r);
  }
  choices.sort(() => Math.random() - .5);
  quizAnswered = false;

  ca.innerHTML = `
    <div class="quiz-panel fade-in" style="max-width:560px; margin:auto;">
      <div class="score-bar">
        ${Array.from({length:quizQueue.length}, (_,i) => `
          <div class="score-pip ${i<quizHistory.length ? (quizHistory[i]?'correct':'wrong') : ''}"></div>
        `).join('')}
      </div>
      <div style="font-size:13px; color:var(--tx2); margin-bottom:6px;">
        ${quizIdx + 1} / ${quizQueue.length} асуулт
      </div>
      <div class="quiz-question">Энэ нотны нэр болон тоог олно уу? <span style="color:var(--ac);font-size:11px;">(дарж сонсож болно 🔊)</span></div>
      <div class="quiz-note-display"
           style="background:linear-gradient(135deg,${q.color}dd,${q.color}88);"
           onclick="playNote(${q.freq})" title="Дарж дуу сонсох">
        ${q.sym}
        <div class="num-corner">${q.num}</div>
      </div>

      <div style="background:#1a1c28; border-radius:12px; padding:12px 16px; margin-bottom:20px; overflow-x:auto;">
        ${buildStaffSVG(q)}
      </div>

      <div class="quiz-choices">
        ${choices.map(c => `
          <button class="quiz-choice" id="qc-${c.sym}"
                  onclick="answerQuiz('${c.sym}', '${q.sym}')">
            ${c.sym} <span style="font-size:11px;color:var(--ac);font-weight:800;">№${c.num}</span><br>
            <span style="font-size:12px; font-weight:400; color:var(--tx2);">${c.mn}</span>
          </button>
        `).join('')}
      </div>

      <div class="quiz-result" id="quiz-result"></div>
      <div class="quiz-sub" id="quiz-sub"></div>
      <button class="quiz-next-btn" id="quiz-next" onclick="nextQuiz()">Дараачийн →</button>
    </div>`;

  // Quiz эхлэхэд асуултын дууг автоматаар тоглуулна
  setTimeout(() => playNote(q.freq), 300);
}

function answerQuiz(chosen, correct) {
  if (quizAnswered) return;
  quizAnswered = true;

  const isCorrect = chosen === correct;
  quizHistory.push(isCorrect);
  if (isCorrect) quizScore++;

  document.querySelectorAll('.quiz-choice').forEach(b => {
    const sym = b.id.replace('qc-', '');
    if (sym === correct) b.classList.add('correct');
    if (sym === chosen && !isCorrect) b.classList.add('wrong');
    b.disabled = true;
  });

  const resultEl = document.getElementById('quiz-result');
  const subEl = document.getElementById('quiz-sub');
  const nextBtn = document.getElementById('quiz-next');
  const cNote = NOTES.find(n=>n.sym===correct);

  if (isCorrect) {
    resultEl.textContent = '✅ Зөв!';
    resultEl.style.color = '#27ae60';
    subEl.textContent = `${correct} нот — ${cNote.mn} (№${cNote.num})`;
  } else {
    resultEl.textContent = '❌ Буруу';
    resultEl.style.color = '#e74c3c';
    subEl.textContent = `Зөв хариулт: ${correct} (${cNote.mn}, №${cNote.num})`;
  }
  playNote(cNote.freq);
  nextBtn.style.display = 'inline-block';
}

function nextQuiz() {
  quizIdx++;
  showQuizQuestion();
}

buildSidebar();
selectNote('C');
</script>
</body>
